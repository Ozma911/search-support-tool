<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>検索サポートツール</title>

<style>
body { font-family: Arial; padding: 10px; }
label { display: block; margin-top: 10px; font-weight: bold; }
select { width: 100%; padding: 6px; }
button { margin-top: 15px; padding: 10px; width: 100%; }
#result { margin-top: 20px; }
</style>

<script src="https://cdn.jsdelivr.net/npm/xlsx/dist/xlsx.full.min.js"></script>
</head>

<body>

<h2>検索サポートツール</h2>

<div id="form"></div>

<button onclick="search()">検索</button>

<div id="result"></div>

<script>

// =========================
// 項目定義
// =========================
const fields = {
"販売店の有無": ["", "有", "無"],
"クラウド構成orハイブリッド構成": ["", "クラウド構成", "ハイブリッド構成"],
"総床数カテゴリ": [""],
"最大Viewer同時接続数": ["", "30台以下","31台以上60台未満","60台以上"],
"契約期間": ["", "月額", "1年", "5年"],
"眠りSCAN eyeの有無": ["", "有", "無"],
"眠りSCAN導入台数": ["", "18床以下", "19床以上"],
"眠りSCAN購入形態": ["", "購入", "レンタル"],
"介護記録ソフト連携": ["","CCJ（CAREKARTE）","NDソフト（ほのぼのNEXT）"],
"ナースコール連携": ["","アイホン（Vi-nurse）","ケアコム（CICCS-EX）"],
"インカム連携": ["","CCJ（ハナスト）","BONX（BONX）"],
"環境センサー連携": ["","環境センサー","環境センサー＋ドア開閉検知ユニット"],
"トイレDIARY_個室か共用か": ["","個室用","共用"],
"トイレDIARY_便器ふち幅": ["","30mm-40mm","41mm-50mm","51mm-60mm"],
"トイレDIARY_遠距離か近距離か": ["","遠距離","近距離"],
"トイレDIARY_ケーブル長": ["","2m","3.5m"],
"トイレDIARY_介護記録ソフト連携": ["","有","無"],
"eye_接続方式": ["","有線","無線"],
"eye_マウント": ["","固定","移動式"],
"eye_SDカード": ["","64GB（同梱）","128GB","256GB"],
"おむつCOLOR_パッケージ": ["","単体使用 or 眠りSCAN4以外","眠りCONNECT連携"],
"おむつCOLOR_セット": ["","1日セット","夜間セット"],
"その他連携": ["","DFree","介護Plus"]
};

// =========================
// フォーム生成
// =========================
function createForm() {
  let html = "";

  Object.keys(fields).forEach(key => {
    html += `<label>${key}</label>`;
    html += `<select id="${key}">`;

    fields[key].forEach(v => {
      html += `<option value="${v}">${v || "未選択"}</option>`;
    });

    html += `</select>`;
  });

  document.getElementById("form").innerHTML = html;
}

createForm();

// =========================
// 総床数カテゴリ 切替
// =========================
document.addEventListener("change", function(e) {

  if (e.target.id === "クラウド構成orハイブリッド構成") {

    let val = e.target.value;
    let bed = document.getElementById("総床数カテゴリ");

    let options = [""];

    if (val === "ハイブリッド構成") {
      options = ["", "18床以下","19床以上120床以下","121床以上200床以下","201床以上"];
    } else if (val === "クラウド構成") {
      options = ["", "18床以下","19床以上"];
    }

    bed.innerHTML = options.map(v =>
      `<option value="${v}">${v || "未選択"}</option>`
    ).join("");
  }
});

// =========================
// 検索処理（安定版）
// =========================
async function search() {

  const res = await fetch("master.xlsx?nocache=" + Date.now());
  const buf = await res.arrayBuffer();
  const wb = XLSX.read(buf);

  let results = [];

  wb.SheetNames.forEach(name => {

    let data = XLSX.utils.sheet_to_json(wb.Sheets[name]);

    let filtered = data.filter(row => {

      return Object.keys(fields).every(key => {

        let val = document.getElementById(key).value;
        if (!val) return true;

        let excelVal = row[key];
        if (excelVal === undefined) return true;

        return String(excelVal).includes(val);
      });

    });

    filtered.forEach(r => results.push({sheet:name, data:r}));

  });

// =========================
// 表示（完全ロールバック版）
// =========================
let html = "";

if (results.length === 0) {
  html = "該当なし";
} else {

  results.forEach(r => {

    html += `<div style="border:1px solid #ccc;padding:10px;margin-bottom:10px;">`;

    html += `<b>シート：</b>${r.sheet}<br><br>`;

    Object.keys(r.data).forEach(k => {

      // 検索名のみ表示
      if (k.includes("検索名") && r.data[k]) {

        let no = k.replace("検索名","製品番号");

        html += `<b>${k}</b><br>${r.data[k]}<br>`;
        html += `<b>${no}</b><br>${r.data[no] || ""}<br><br>`;
      }

    });

    html += `</div>`;
  });
}

document.getElementById("result").innerHTML = html;
}

</script>

</body>
</html>
