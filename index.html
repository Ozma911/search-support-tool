<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>検索サポートツール</title>

<style>
body { font-family: Arial; padding: 10px; }
label { display: block; margin-top: 10px; font-weight: bold; }
select { width: 100%; padding: 6px; }
button { margin-top: 15px; padding: 10px; width: 100%; }
#result { margin-top: 20px; }
.debug { border:2px solid red; padding:10px; margin-bottom:10px; }
</style>

<script src="https://cdn.jsdelivr.net/npm/xlsx/dist/xlsx.full.min.js"></script>
</head>

<body>

<h2>検索サポートツール</h2>

<div id="form"></div>
<button onclick="search()">検索</button>
<div id="result"></div>

<script>

// =========================
// 項目定義
// =========================
const fields = {
"販売店の有無": ["", "有", "無"],
"クラウド構成orハイブリッド構成": ["", "クラウド構成", "ハイブリッド構成"],
"総床数カテゴリ": [""],
"最大Viewer同時接続数": ["","30台以下","31台以上60台未満","60台以上"],
"契約期間": ["", "月額", "1年", "5年"],
"眠りSCAN eyeの有無": ["", "有", "無"],
"眠りSCAN導入台数": ["", "18床以下", "19床以上"],
"眠りSCAN購入形態": ["", "購入", "レンタル"],
"介護記録ソフト連携": ["","CCJ（CAREKARTE）","NDソフト（ほのぼのNEXT）","ワイズマン（ワイズマンSP）","内田洋行（絆Core）","日立システムズ（福祉の森）","BOS（ブルーオーシャンノート）","EMシステムズ（すこやかサン）","富士通（HOPE LifeMark WINCARE）","東経システム（福祉見聞録）"],
"ナースコール連携": ["","アイホン（Vi-nurse）","ケアコム（CICCS-EX）","ナカヨ（NYC-Si）","平和テクノ（Yuiコール）","名電通（ナースエコール）","ジーコム（ジーコム）","iSEED（パルモスマートコール）","ユニティー・ネットワーク（あんしんの絆）"],
"インカム連携": ["","CCJ（ハナスト）","BONX（BONX）","サイエンスアーツ（buddycom）","TBeye（クリアトークカム）","VOYT（VOYT CONNECT）"],
"環境センサー連携": ["","環境センサー","環境センサー＋ドア開閉検知ユニット"],
"トイレDIARY_個室か共用か": ["","個室用","共用"],
"トイレDIARY_便器ふち幅": ["","30mm-40mm","41mm-50mm","51mm-60mm"],
"トイレDIARY_遠距離か近距離か": ["","遠距離","近距離"],
"トイレDIARY_ケーブル長": ["","2m","3.5m"],
"トイレDIARY_介護記録ソフト連携": ["","有","無"],
"eye_接続方式": ["","有線","無線"],
"eye_マウント": ["","固定","移動式"],
"eye_SDカード": ["","64GB（同梱）","128GB","256GB"],
"おむつCOLOR_パッケージ": ["","単体使用 or 眠りSCAN4以外","眠りCONNECT連携"],
"おむつCOLOR_セット": ["","1日セット","夜間セット"],
"その他連携": ["","DFree","介護Plus"]
};

// =========================
// フォーム生成
// =========================
function createForm() {
  let html = "";
  Object.keys(fields).forEach(key => {
    html += `<label>${key}</label>`;
    html += `<select id="${key}">`;
    fields[key].forEach(v => {
      html += `<option value="${v}">${v || "未選択"}</option>`;
    });
    html += `</select>`;
  });
  document.getElementById("form").innerHTML = html;
}
createForm();

// =========================
// 総床数切替
// =========================
document.addEventListener("change", function(e) {
  if (e.target.id === "クラウド構成orハイブリッド構成") {

    let val = e.target.value;
    let bed = document.getElementById("総床数カテゴリ");

    let options = [""];

    if (val === "ハイブリッド構成") {
      options = ["","18床以下","19床以上120床以下","121床以上200床以下","201床以上"];
    } else if (val === "クラウド構成") {
      options = ["","18床以下","19床以上"];
    }

    bed.innerHTML = options.map(v =>
      `<option value="${v}">${v || "未選択"}</option>`
    ).join("");
  }
});

// =========================
// 正規化
// =========================
function normalize(str) {
  if (!str) return "";
  return String(str)
    .trim()
    .replace(/\s+/g, "")
    .replace(/パック/g, "")
    .replace(/台/g, "")
    .replace(/床/g, "")
    .replace(/以上/g, "")
    .replace(/未満/g, "")
    .replace(/以下/g, "")
    .replace(/-/g, "")
    .replace(/～/g, "");
}

// =========================
// 検索（デバッグ強制表示）
// =========================
async function search() {

  const res = await fetch("master.xlsx?v=" + new Date().getTime(), {
    cache: "no-store"
  });

  const buf = await res.arrayBuffer();
  const wb = XLSX.read(buf);

  let html = "";

  wb.SheetNames.forEach(name => {

    let data = XLSX.utils.sheet_to_json(wb.Sheets[name]);

    data.forEach((row, index) => {

      let ngList = [];

      Object.keys(fields).forEach(key => {

        let val = document.getElementById(key).value;
        if (!val) return;

        let a = normalize(row[key]);
        let b = normalize(val);

        if (!a.includes(b)) {
          ngList.push(`${key} → 入力:${val} / Excel:${row[key]}`);
        }
      });

      // ★ここ重要：全行表示
      html += "<div class='debug'>";

      html += `<b>シート：</b>${name}<br>`;
      html += `<b>行：</b>${index + 2}<br><br>`;

      if (ngList.length === 0) {
        html += "<b style='color:green'>完全一致</b><br>";
      } else {
        html += "<b style='color:red'>不一致：</b><br>";
        ngList.forEach(x => html += x + "<br>");
      }

      html += "<hr>";

      Object.keys(row).forEach(k => {
        if (k.includes("検索名") && row[k]) {
          let no = k.replace("検索名","製品番号");
          html += `<b>${row[k]}</b>（${row[no] || ""}）<br>`;
        }
      });

      html += "</div>";

    });

  });

  document.getElementById("result").innerHTML = html || "<b>データなし</b>";
}

</script>

</body>
</html>
