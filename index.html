<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>検索サポートツール</title>

<style>
body { font-family: Arial; padding: 10px; }
label { display: block; margin-top: 10px; font-weight: bold; }
select { width: 100%; padding: 6px; }
button { margin-top: 15px; padding: 10px; width: 100%; }
#result { margin-top: 20px; }
.card { border:1px solid #ccc;padding:10px;margin-bottom:10px; }
</style>

</head>
<body>

<h2>検索サポートツール</h2>

<div id="form"></div>
<button onclick="search()">検索</button>

<div id="result"></div>

<script>

// =========================
// 項目定義（←これはそのまま採用）
// =========================
const fields = {
"販売店の有無": ["", "有", "無"],

"クラウド構成orハイブリッド構成": ["", "クラウド構成", "ハイブリッド構成"],

"総床数カテゴリ": [""],

"最大Viewer同時接続数": ["",
"30台以下",
"31台以上60台未満",
"60台以上"
],

"契約期間": ["", "月額", "1年", "5年"],

"眠りSCAN eyeの有無": ["", "有", "無"],

"眠りSCAN導入台数": ["", "18床以下", "19床以上"],

"眠りSCAN購入形態": ["", "購入", "レンタル"],

"介護記録ソフト連携": ["",
"CCJ（CAREKARTE）",
"NDソフト（ほのぼのNEXT）",
"ワイズマン（ワイズマンSP）",
"内田洋行（絆Core）",
"日立システムズ（福祉の森）",
"BOS（ブルーオーシャンノート）",
"EMシステムズ（すこやかサン）",
"富士通（HOPE LifeMark WINCARE）",
"東経システム（福祉見聞録）"
],

"ナースコール連携": ["",
"アイホン（Vi-nurse）",
"ケアコム（CICCS-EX）",
"ナカヨ（NYC-Si）",
"平和テクノ（Yuiコール）",
"名電通（ナースエコール）",
"ジーコム（ジーコム）",
"iSEED（パルモスマートコール）",
"ユニティー・ネットワーク（あんしんの絆）"
],

"インカム連携": ["",
"CCJ（ハナスト）",
"BONX（BONX）",
"サイエンスアーツ（buddycom）",
"TBeye（クリアトークカム）",
"VOYT（VOYT CONNECT）"
],

"環境センサー連携": ["",
"環境センサー",
"環境センサー＋ドア開閉検知ユニット"
],

"トイレDIARY_個室か共用か": ["",
"個室用",
"共用"
],

"トイレDIARY_便器ふち幅": ["",
"30mm-40mm",
"41mm-50mm",
"51mm-60mm"
],

"トイレDIARY_遠距離か近距離か": ["",
"遠距離",
"近距離"
],

"トイレDIARY_ケーブル長": ["",
"2m",
"3.5m"
],

"トイレDIARY_介護記録ソフト連携": ["",
"有",
"無"
],

"eye_接続方式": ["",
"有線",
"無線"
],

"eye_マウント": ["",
"固定",
"移動式"
],

"eye_SDカード": ["",
"64GB（同梱）",
"128GB",
"256GB"
],

"おむつCOLOR_パッケージ": ["",
"単体使用 or 眠りSCAN4以外",
"眠りCONNECT連携"
],

"おむつCOLOR_セット": ["",
"1日セット",
"夜間セット"
],

"その他連携": ["",
"DFree",
"介護Plus"
]
};

// =========================
// ★ここにJSON貼る
// =========================
const masterData = {
  // ←ここに貼る
};

// =========================
// フォーム生成
// =========================
function createForm() {

  let html = "";

  Object.keys(fields).forEach(key => {

    html += `<label>${key}</label>`;
    html += `<select id="${key}">`;

    fields[key].forEach(v => {
      html += `<option value="${v}">${v || "未選択"}</option>`;
    });

    html += `</select>`;
  });

  document.getElementById("form").innerHTML = html;
}

// =========================
// イベント設定（総床数連動）
// =========================
function setupEvents() {

  document.getElementById("クラウド構成orハイブリッド構成")
    .addEventListener("change", function() {

      let val = this.value;
      let bed = document.getElementById("総床数カテゴリ");

      let options = [""];

      if (val === "ハイブリッド構成") {
        options = ["", "18床以下","19床以上120床以下","121床以上200床以下","201床以上"];
      } else if (val === "クラウド構成") {
        options = ["", "18床以下","19床以上"];
      }

      bed.innerHTML = options.map(v =>
        `<option value="${v}">${v || "未選択"}</option>`
      ).join("");
    });

  // 初期反映
  document.getElementById("クラウド構成orハイブリッド構成")
    .dispatchEvent(new Event("change"));
}

// =========================
// 検索
// =========================
function search() {

  // 必須チェック
  const required = ["販売店の有無", "契約期間"];

  for (let r of required) {
    if (!document.getElementById(r).value) {
      alert(r + "は必須です");
      return;
    }
  }

  let selectedKeys = Object.keys(fields)
    .filter(k => document.getElementById(k).value !== "");

  let results = [];

  for (let sheet in masterData) {

    let rows = masterData[sheet];
    let hit = null;

    for (let row of rows) {

      let ok = true;

      for (let key of selectedKeys) {

        let inputVal = document.getElementById(key).value;

        if (!(key in row)) continue;

        if (String(row[key]).trim() !== inputVal) {
          ok = false;
          break;
        }
      }

      if (ok) {
        hit = row;
        break;
      }
    }

    if (hit) {
      results.push({ sheet, data: hit });
    }
  }

  // 表示
  let html = "";

  if (results.length === 0) {
    html = "該当なし";
  } else {

    results.forEach(r => {

      html += `<div class="card">`;
      html += `<b>シート：</b>${r.sheet}<br><br>`;

      Object.keys(r.data).forEach(k => {

        if (k.includes("検索名")) {

          let no = k.replace("検索名","製品番号");

          html += `<b>${k}</b><br>${r.data[k]}<br>`;
          html += `<b>${no}</b><br>${r.data[no] || ""}<br><br>`;
        }
      });

      html += `</div>`;
    });
  }

  document.getElementById("result").innerHTML = html;
}

// =========================
// 初期化
// =========================
window.onload = function() {
  createForm();
  setupEvents();
};

</script>

</body>
</html>
