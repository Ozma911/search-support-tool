<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<title>検索サポートツール</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<script src="https://cdn.jsdelivr.net/npm/xlsx/dist/xlsx.full.min.js"></script>

<style>
body { font-family: Arial; max-width: 600px; margin: auto; padding: 20px; }
select, button { width: 100%; margin-bottom: 12px; padding: 8px; }
.card { border: 1px solid #ccc; padding: 10px; border-radius: 8px; margin-bottom: 10px; }
</style>
</head>

<body>

<h2>検索サポートツール</h2>

<div id="form"></div>

<button onclick="search()">検索</button>

<div id="result"></div>

<script>
let allData = [];

// ★ 全項目（ここが重要）
const fields = [
"販売店の有無",
"クラウド構成orハイブリッド構成",
"総床数カテゴリ",
"最大Viewer同時接続数",
"契約期間",
"眠りSCAN eyeの有無",
"眠りSCAN導入台数",
"眠りSCAN購入形態",
"介護記録ソフト連携",
"ナースコール連携",
"インカム連携",
"環境センサー連携",
"トイレDIARY_個室か共用か",
"トイレDIARY_便器ふち幅",
"トイレDIARY_遠距離か近距離か",
"トイレDIARY_ケーブル長",
"トイレDIARY_介護記録ソフト連携",
"eye_接続方式",
"eye_マウント",
"eye_SDカード",
"おむつCOLOR_パッケージ",
"おむつCOLOR_セット",
"その他連携"
];

async function init() {

  const res = await fetch("master.xlsx");
  const data = await res.arrayBuffer();
  const workbook = XLSX.read(data);

  workbook.SheetNames.forEach(name => {
    const json = XLSX.utils.sheet_to_json(workbook.Sheets[name]);
    allData.push(...json);
  });

  createForm();
}

// ★ フォーム自動生成
function createForm() {

  let html = "";

  fields.forEach(f => {
    html += `<label>${f}</label>`;
    html += `<select id="${f}"><option value="">未選択</option></select>`;
  });

  document.getElementById("form").innerHTML = html;

  // 初期選択肢
  fields.forEach(setOptions);

}

// ★ 選択肢生成
function setOptions(field) {

  const values = [...new Set(
    allData.map(r => r[field]).filter(v => v)
  )];

  let html = "<option value=''>未選択</option>";

  values.forEach(v => {
    html += `<option value="${v}">${v}</option>`;
  });

  document.getElementById(field).innerHTML = html;
}

// ★ 構成→床数連動
document.addEventListener("change", function(e) {

  if (e.target.id === "クラウド構成orハイブリッド構成") {

    const config = e.target.value;

    const values = [...new Set(
      allData
        .filter(r => r["クラウド構成orハイブリッド構成"] === config)
        .map(r => r["総床数カテゴリ"])
        .filter(v => v)
    )];

    let html = "<option value=''>未選択</option>";

    values.forEach(v => {
      html += `<option value="${v}">${v}</option>`;
    });

    document.getElementById("総床数カテゴリ").innerHTML = html;
  }

});

// ★ 検索
function search() {

  const conditions = {};

  fields.forEach(f => {
    conditions[f] = document.getElementById(f).value;
  });

  const filtered = allData.filter(row => {

    for (let key in conditions) {

      if (conditions[key] === "") continue;

      if (row[key] !== conditions[key]) {
        return false;
      }
    }

    return true;
  });

  let html = "";

  if (filtered.length === 0) {
    html = "該当なし";
  } else {

    filtered.forEach(row => {

      html += "<div class='card'>";

      Object.keys(row).forEach(key => {

        if ((key.includes("検索名") || key.includes("製品番号")) && row[key]) {
          html += "<b>" + key + "</b><br>" + row[key] + "<br><br>";
        }

      });

      html += "</div>";
    });
  }

  document.getElementById("result").innerHTML = html;
}

init();
</script>

</body>
</html>
