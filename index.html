function createForm() {
  const form = document.getElementById("form");
  let html = "";

  Object.keys(fields).forEach(k => {

    html += `<label>${k}</label>`;

    // 施設名だけ手入力
    if (k === "施設名") {
      html += `<input id="${k}" type="text">`;
      return;
    }

    html += `<select id="${k}">`;
    fields[k].forEach(v => {
      html += `<option value="${v}">${v || "未選択"}</option>`;
    });
    html += `</select>`;
  });

  form.innerHTML = html;
}

//////////////////////////////////////////////////////
// ⑤ TEXT出力
//////////////////////////////////////////////////////
document.getElementById("textBtn").addEventListener("click", () => {

  const facilityName = document.getElementById("施設名")?.value || "（未入力）";

  const selected = {};
  Object.keys(fields).forEach(k => {
    const el = document.getElementById(k);
    if (!el) return;
    if (el.value) selected[k] = el.value;
  });

  if (Object.keys(selected).length === 0) {
    alert("条件を選択してください");
    return;
  }

  let resultText = "";

  for (let sheet in masterData) {

    //////////////////////////////////////
    // ★トイレDIARY 強制フィルタ
    //////////////////////////////////////
    const type = selected["トイレDIARY_個室か共用か"];

    if (sheet.includes("トイレDIARY")) {

      if (!type) continue;

      if (type === "個室用" && sheet.includes("共用")) continue;
      if (type === "共用" && sheet.includes("個室")) continue;
    }

    const rules = sheetRules[sheet] || [];

    //////////////////////////////////////
    // ★ルールなし排除
    //////////////////////////////////////
    if (!rules || rules.length === 0) continue;

    //////////////////////////////////////
    // ★必須未入力スキップ
    //////////////////////////////////////
    let skip = false;
    for (let k of rules) {
      if (!selected[k]) {
        skip = true;
        break;
      }
    }
    if (skip) continue;

    //////////////////////////////////////
    // ★マッチ判定
    //////////////////////////////////////
    const rows = masterData[sheet];
    let hit = null;

    for (let row of rows) {

      let ok = true;

      for (let k of rules) {

        const sel = selected[k];
        const val = row[k];

        if (!val || String(val).trim() !== String(sel).trim()) {
          ok = false;
          break;
        }
      }

      if (ok) {
        hit = row;
        break;
      }
    }

    //////////////////////////////////////
    // 出力整形
    //////////////////////////////////////
    resultText += "--------------------------------------\n";
    resultText += sheet + "\n\n";

    if (hit) {

      Object.keys(hit).forEach(k => {
        if (fields[k]) return;
        resultText += k + "\n" + hit[k] + "\n\n";
      });

    } else {
      resultText += "該当なし\n\n";
    }
  }

  const text =
`件名：眠りConnect 見積作成のお願い

●●さん

お疲れ様です、●●です。

下記案件について、眠りConnectの見積書作成をお願いできますでしょうか。

◇案件情報
・施設名：${facilityName}

◇以下の内容を基に作成お願いいたします。

${resultText}

お手数ですが、●月●日までにご対応いただけますと助かります。
不明点等ございましたらご連絡ください。

ご確認よろしくお願いいたします。`;

  document.getElementById("outputText").value = text;
});

//////////////////////////////////////////////////////
// ⑦ イベント（ここが重要）
//////////////////////////////////////////////////////
function setupEvents() {

  //////////////////////////////////////
  // ① 既存：構成 → 床数制御
  //////////////////////////////////////
  const config = document.getElementById("クラウド構成orハイブリッド構成");
  const bed = document.getElementById("総床数カテゴリ");

  config.addEventListener("change", function () {

    let val = this.value;
    let options = [""];

    if (val === "ハイブリッド構成") {
      options = ["","18床以下","19床以上120床以下","121床以上200床以下","201床以上"];
    }

    if (val === "クラウド構成") {
      options = ["","18床以下","19床以上"];
    }

    bed.innerHTML = options
      .map(v => `<option value="${v}">${v || "未選択"}</option>`)
      .join("");
  });

  //////////////////////////////////////
  // ② 既存：eye制御
  //////////////////////////////////////
  const eye = document.getElementById("眠りSCAN eyeの有無");
  const eyeItems = ["eye_接続方式","eye_マウント","eye_SDカード"];

  eye.addEventListener("change", function () {

    const on = this.value === "有";

    eyeItems.forEach(id => {
      const el = document.getElementById(id);
      if (!el) return;

      el.disabled = !on;
      if (!on) el.value = "";
    });
  });

  //////////////////////////////////////
  // ③ トイレDIARY制御（修正版）
  //////////////////////////////////////
  const toiletType = document.getElementById("トイレDIARY_個室か共用か");

  const commonItems = [
    "トイレDIARY_遠距離か近距離か",
    "トイレDIARY_ケーブル長"
  ];

  const careItem = "トイレDIARY_介護記録ソフト連携";

  toiletType.addEventListener("change", function () {

    const val = this.value;

    // 一旦すべてON
    [...commonItems, careItem].forEach(id => {
      const el = document.getElementById(id);
      if (!el) return;
      el.disabled = false;
    });

    if (val === "共用") {
      // 共用 → 介護連携だけOFF
      const el = document.getElementById(careItem);
      if (el) {
        el.disabled = true;
        el.value = "";
      }
    }

    if (val === "個室用") {
      // 個室 → 遠距離・ケーブルだけOFF（←ここ修正ポイント）
      commonItems.forEach(id => {
        const el = document.getElementById(id);
        if (!el) return;
        el.disabled = true;
        el.value = "";
      });

      // ★介護連携はONのまま（←重要）
    }

  });

  //////////////////////////////////////
  // ④ 初期反映
  //////////////////////////////////////
  config.dispatchEvent(new Event("change"));
  eye.dispatchEvent(new Event("change"));
  toiletType.dispatchEvent(new Event("change"));
}


//////////////////////////////////////////////////////
// ⑧ マスタ選択（安定版）
//////////////////////////////////////////////////////
function selectBestMaster(selected) {

  for (let sheet in masterData) {

    const rows = masterData[sheet];

    const hit = rows.find(row => {

      for (let k in selected) {

        if (!row[k]) return false;

        if (String(row[k]).trim() !== String(selected[k]).trim()) {
          return false;
        }
      }

      return true;
    });

    if (hit) {
      return { sheet, row: hit };
    }
  }

  return null;
}

//////////////////////////////////////////////////////
// ⑨ 検索
//////////////////////////////////////////////////////
function search() {

  const selected = {};

  Object.keys(fields).forEach(k => {
    const v = document.getElementById(k).value;
    if (v) selected[k] = v;
  });

  // ★未入力ガード
  if (Object.keys(selected).length === 0) {
    alert("条件を選択してください");
    return;
  }

  let html = "";

  for (let sheet in masterData) {

    //////////////////////////////////////
    // ★トイレDIARY 強制フィルタ（最重要）
    //////////////////////////////////////
    const type = selected["トイレDIARY_個室か共用か"];

    if (sheet.includes("トイレDIARY")) {

      if (!type) continue;

      if (type === "個室用" && sheet.includes("共用")) continue;
      if (type === "共用" && sheet.includes("個室")) continue;
    }

    const rules = sheetRules[sheet] || [];

    //////////////////////////////////////
    // ★ルールなしマスタ排除
    //////////////////////////////////////
    if (!rules || rules.length === 0) continue;

    //////////////////////////////////////
    // ★必須未入力スキップ
    //////////////////////////////////////
    let skip = false;
    for (let k of rules) {
      if (!selected[k]) {
        skip = true;
        break;
      }
    }
    if (skip) continue;

    //////////////////////////////////////
    // ★マッチ判定
    //////////////////////////////////////
    const rows = masterData[sheet];

    let hit = null;
    let reasons = [];

    for (let row of rows) {

      let ok = true;
      reasons = [];

      for (let k of rules) {

        const sel = selected[k];
        const val = row[k];

        if (!val) {
          ok = false;
          reasons.push(`${k} がマスタ未定義`);
          continue;
        }

        if (String(val).trim() !== String(sel).trim()) {
          ok = false;
          reasons.push(`${k} が不一致`);
        }
      }

      if (ok) {
        hit = row;
        break;
      }
    }

    //////////////////////////////////////
    // 表示
    //////////////////////////////////////
    html += `<div class="card">`;
    html += `<b>${sheet}</b><br><br>`;

    if (hit) {

      Object.keys(hit).forEach(k => {
        html += `<b>${k}</b><br>${hit[k]}<br><br>`;
      });

    } else {

      html += `<span class="warn">該当なし</span><br><br>`;
      html += `<b>原因：</b><br>`;

      if (reasons.length === 0) {
        html += "条件不足<br>";
      } else {
        reasons.forEach(r => html += `・${r}<br>`);
      }
    }

    html += `</div>`;
  }

  document.getElementById("result").innerHTML = html;
}
