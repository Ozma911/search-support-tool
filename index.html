<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>検索サポートツール</title>

<style>
body { font-family: Arial; padding: 10px; }
label { display: block; margin-top: 10px; font-weight: bold; }
select { width: 100%; padding: 6px; }
button { margin-top: 15px; padding: 10px; width: 100%; }
#result { margin-top: 20px; }
</style>

<script src="https://cdn.jsdelivr.net/npm/xlsx/dist/xlsx.full.min.js"></script>
</head>

<body>

<h2>検索サポートツール</h2>

<div id="form"></div>

<button onclick="search()">検索</button>

<div id="result"></div>

<script>

// =========================
// 項目定義
// =========================
const fields = {
  "販売店の有無": ["", "有", "無"],
  "クラウド構成orハイブリッド構成": ["", "クラウド構成", "ハイブリッド構成"],
  "総床数カテゴリ": ["", "18床以下","19床以上120床以下","121床以上200床以下","201床以上"],
  "最大Viewer同時接続数": ["", "30台以下","31台以上60台未満","60台以上"],
  "契約期間": ["", "月額", "1年", "5年"],
  "眠りSCAN eyeの有無": ["", "有", "無"],
  "眠りSCAN導入台数": ["", "18床以下", "19床以上"],
  "眠りSCAN購入形態": ["", "購入", "レンタル"],
  "介護記録ソフト連携": ["","CCJ（CAREKARTE）","NDソフト（ほのぼのNEXT）"],
  "ナースコール連携": ["","アイホン（Vi-nurse）","ケアコム（CICCS-EX）"],
  "インカム連携": ["","CCJ（ハナスト）","BONX（BONX）"],
  "環境センサー連携": ["","環境センサー","環境センサー＋ドア開閉検知ユニット"],
  "トイレDIARY_個室か共用か": ["","個室用","共用"],
  "トイレDIARY_便器ふち幅": ["","30mm-40mm","41mm-50mm","51mm-60mm"],
  "トイレDIARY_遠距離か近距離か": ["","遠距離","近距離"],
  "トイレDIARY_ケーブル長": ["","2m","3.5m"],
  "トイレDIARY_介護記録ソフト連携": ["","有","無"],
  "eye_接続方式": ["","有線","無線"],
  "eye_マウント": ["","固定","移動式"],
  "eye_SDカード": ["","64GB（同梱）","128GB","256GB"],
  "おむつCOLOR_パッケージ": ["","単体使用 or 眠りSCAN4以外","眠りCONNECT連携"],
  "おむつCOLOR_セット": ["","1日セット","夜間セット"],
  "その他連携": ["","DFree","介護Plus"]
};


// =========================
// フォーム生成（確実版）
// =========================
function createForm() {

  const container = document.getElementById("form");
  if (!container) return;

  let html = "";

  Object.keys(fields).forEach(key => {

    html += `<label>${key}</label>`;
    html += `<select id="${key}">`;

    fields[key].forEach(v => {
      html += `<option value="${v}">${v === "" ? "未選択" : v}</option>`;
    });

    html += `</select>`;
  });

  container.innerHTML = html;
}


// ★重要：DOM確実ロード後に1回だけ実行
document.addEventListener("DOMContentLoaded", createForm);


// =========================
// 検索処理（安定版）
// =========================
async function search() {

  const res = await fetch("master.xlsx?v=" + Date.now());
  const buf = await res.arrayBuffer();
  const wb = XLSX.read(buf);

  let results = [];

  const sheetMap = {
    "販売店の有無": "ALL",
    "契約期間": "ALL",
    "クラウド構成orハイブリッド構成": ["ハイブリッド構成サーバー特定マスタ"],
    "総床数カテゴリ": ["ハイブリッド構成サーバー特定マスタ","【個室】トイレDIARYマスタ","【共用】トイレDIARYマスタ"],
    "最大Viewer同時接続数": ["ハイブリッド構成サーバー特定マスタ"],
    "眠りSCAN eyeの有無": ["ハイブリッド構成サーバー特定マスタ"],
    "眠りSCAN導入台数": ["クラウド構成マスタ"],
    "眠りSCAN購入形態": ["クラウド構成マスタ"],
    "介護記録ソフト連携": ["介護記録ソフトマスタ"],
    "ナースコール連携": ["ナースコールマスタ"],
    "インカム連携": ["インカムマスタ"],
    "環境センサー連携": ["環境センサマスタ"],
    "トイレDIARY_個室か共用か": ["眠りCONNECT eyeマスタ","【共用】トイレDIARYマスタ"],
    "トイレDIARY_便器ふち幅": ["眠りCONNECT eyeマスタ","【共用】トイレDIARYマスタ"],
    "トイレDIARY_遠距離か近距離か": ["【共用】トイレDIARYマスタ"],
    "トイレDIARY_ケーブル長": ["【共用】トイレDIARYマスタ"],
    "トイレDIARY_介護記録ソフト連携": ["眠りCONNECT eyeマスタ","【共用】トイレDIARYマスタ"],
    "eye_接続方式": ["眠りCONNECT eyeマスタ"],
    "eye_マウント": ["眠りCONNECT eyeマスタ"],
    "eye_SDカード": ["眠りCONNECT eyeマスタ"],
    "おむつCOLOR_パッケージ": ["おむつCOLORマスタ"],
    "おむつCOLOR_セット": ["おむつCOLORマスタ"],
    "その他連携": ["その他連携マスタ"]
  };

  // ★ここが重要：空は完全除外
  const selectedKeys = Object.keys(fields)
    .filter(k => document.getElementById(k).value !== "");

  for (let sheetName of wb.SheetNames) {

    const rows = XLSX.utils.sheet_to_json(wb.Sheets[sheetName], {
      header: 1,
      defval: ""
    });

    if (!rows || rows.length < 2) continue;

    const headers = rows[0].map(h => String(h).trim());
    const dataRows = rows.slice(1);

    const hitRow = dataRows.find(row => {

      // ★条件1個でもNGなら即終了（AND条件）
      for (let key of selectedKeys) {

        const inputVal = document.getElementById(key).value;
        const targetSheets = sheetMap[key];

        if (targetSheets !== "ALL" && !targetSheets.includes(sheetName)) {
          return false;
        }

        const colIndex = headers.indexOf(key);
        if (colIndex === -1) return false;

        const excelVal = String(row[colIndex] ?? "").trim();

        if (!excelVal) return false;

        if (excelVal !== inputVal) return false;
      }

      return true;
    });

    if (hitRow) {
      results.push({ sheet: sheetName, row: hitRow });
    }
  }

  let html = "";

  if (results.length === 0) {
    html = "該当なし";
  } else {

    results.forEach(r => {
      html += `<div style="border:1px solid #ccc;padding:10px;margin-bottom:10px;">`;
      html += `<b>シート：</b>${r.sheet}<br>`;
      html += `一致データあり`;
      html += `</div>`;
    });
  }

  document.getElementById("result").innerHTML = html;
}
  
</script>

</body>
</html>
